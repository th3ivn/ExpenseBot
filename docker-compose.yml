version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-expensebot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-expensebot}
      POSTGRES_DB: ${POSTGRES_DB:-expensebot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-expensebot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-expensebot}:${POSTGRES_PASSWORD:-expensebot}@postgres:5432/${POSTGRES_DB:-expensebot}
      BOT_TOKEN: ${BOT_TOKEN}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      ALLOWED_USER_ID: ${ALLOWED_USER_ID}
      WEBHOOK_HOST: 0.0.0.0
      WEBHOOK_PORT: 8080
      API_BASE_URL: http://api:8000
      WEBAPP_URL: ${WEBAPP_URL:-}
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_started

  webapp:
    build:
      context: .
      dockerfile: Dockerfile.webapp
    restart: unless-stopped
    ports:
      - "3000:80"

volumes:
  postgres_data:
